name: Zazen
options:
  bundleIdPrefix: com.lgreenam
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Zazen:
    type: application
    platform: macOS
    sources:
      - path: Zazen
        excludes:
          - "Sounds/**"
          - "Images/**"
      - path: Zazen/Sounds
        type: folder
        buildPhase: resources
      - path: Zazen/Images
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Zazen/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lgreenam.zazen
        PRODUCT_NAME: Zazen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: "NO"
